name: Android APK Oluştur

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: İmzalı APK üret
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android 35 paketlerini kur
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: APK imza şifresini kontrol et
        env:
          APK_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: |
          if [ -z "$APK_KEY_PASSWORD" ]; then
            echo "APK_KEY_PASSWORD GitHub secret tanımlı değil."
            exit 1
          fi

      - name: İmza dosyasını çöz
        working-directory: android-app
        env:
          APK_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -in keystore/servis-release.jks.enc \
            -out "$RUNNER_TEMP/servis-release.jks" \
            -pass env:APK_KEY_PASSWORD

      - name: İmzalı release APK üret
        working-directory: android-app
        env:
          SERVIS_KEYSTORE_FILE: ${{ runner.temp }}/servis-release.jks
          SERVIS_STORE_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
          SERVIS_KEY_ALIAS: servis-release
          SERVIS_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: APK imzasını doğrula
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose \
            android-app/app/build/outputs/apk/release/app-release.apk

      - name: APK dosyasını yayımla
        uses: actions/upload-artifact@v4
        with:
          name: servis-yonetim-apk-v1.0.3
          path: android-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 90
